<svg width="100%" viewBox="0 0 680 310" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Windowed soft-argmax matching strategy</title>
<desc>A source keypoint's feature is compared to all target patches via cosine similarity. Argmax finds the peak, then soft-argmax refines within a K×K window around it.</desc>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <style>
    text { font-family: sans-serif; fill: #3d3d3a; }
    .th { font-size: 14px; font-weight: 500; }
    .ts { font-size: 12px; font-weight: 400; fill: #73726c; }
    .c-coral rect { fill: #FAECE7; stroke: #993C1D; }
    .c-amber rect { fill: #FAEEDA; stroke: #854F0B; }
    .c-green rect { fill: #EAF3DE; stroke: #3B6D11; }
    .c-coral .th { fill: #712B13; }
    .c-amber .th { fill: #633806; }
    .c-green .th { fill: #27500A; }
    .c-coral .ts { fill: #993C1D; }
    .c-amber .ts { fill: #854F0B; }
    .c-green .ts { fill: #3B6D11; }
    .arr { stroke: #73726c; stroke-width: 1.5; fill: none; }
  </style>
</defs>

